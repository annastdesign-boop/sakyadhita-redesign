# ────────────────────────────────────────────────────────────────
# Sakyadhita Content Editor (Decap CMS)
#
# HOW PUBLISHING WORKS (simple mode):
#   Save = published. Every save becomes a commit and the site
#   redeploys (~2 min). Image uploads save immediately too.
#   (The draft→review workflow was removed 2026-07 — it kept locking
#   uploaded images in a broken "Draft" state.)
# ────────────────────────────────────────────────────────────────

backend:
  name: github
  repo: annastdesign-boop/sakyadhita-redesign
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

site_url: https://sakyadhita-redesign.netlify.app
logo_url: https://sakyadhita-redesign.netlify.app/assets/logo-flower.png

media_folder: public/uploads
public_folder: /uploads

# Focal points use the custom "focal" widget (see admin/index.html):
# a click grid that stores an "X% Y%" position — no cropping needed.

collections:

  # ── PAGES — page-by-page editing ──────────────────────────────
  # Note: page edits save straight to the site (single-document files).
  - name: pages
    label: "📄 Pages"
    editor: { preview: false }
    files:
      - name: home
        label: "🏠 Home page"
        file: src/data/pages/home.json
        description: >
          All text, images, buttons, and cards on the home page. The map pins
          come from the Branches collection (turn on "Show on the home-page
          map?" there).
        fields:
          - { name: _comment, label: "(internal note)", widget: string, required: false }
          - name: seo
            label: "Browser tab & link previews (SEO)"
            widget: object
            required: false
            collapsed: true
            fields:
              - { name: title, label: "Page title (browser tab)", widget: string, required: false }
              - { name: description, label: "Description (search engines & link previews)", widget: text, required: false }
              - { name: ogImage, label: "Link-preview image", widget: image, required: false }
          - name: hero
            label: "Hero (top of page)"
            widget: object
            required: false
            fields:
              - { name: logo, label: "Logo image", widget: image, required: false }
              - { name: logoAlt, label: "Logo alt text (for screen readers)", widget: string, required: false }
              - { name: titleName, label: "Title — first line (e.g. Sakyadhita)", widget: string, required: false }
              - { name: titleFull, label: "Title — second line", widget: string, required: false }
              - { name: announcement, label: "Announcement line (orange, under the title — leave empty to hide)", widget: string, required: false }
              - { name: text, label: "Intro paragraph", widget: text, required: false }
              - name: primaryCta
                label: "Main button"
                widget: object
                required: false
                fields:
                  - { name: label, label: Label, widget: string, required: false }
                  - { name: href, label: Link, widget: string, required: false }
              - name: secondaryCta
                label: "Second button"
                widget: object
                required: false
                fields:
                  - { name: label, label: Label, widget: string, required: false }
                  - { name: href, label: Link, widget: string, required: false }
              - name: marquee
                label: "Scrolling photo strip"
                label_singular: photo
                widget: list
                required: false
                summary: "{{fields.img}}"
                fields:
                  - { name: img, label: Photo, widget: image, required: false }
                  - name: focus
                    label: "Focal point"
                    widget: focal
                    required: false
              - name: credit
                label: "Photo credit line"
                widget: object
                required: false
                fields:
                  - { name: text, label: "Text before the link", widget: string, required: false }
                  - { name: linkLabel, label: "Link text (photographer's name)", widget: string, required: false }
                  - { name: linkUrl, label: "Link URL", widget: string, required: false }
          - name: stats
            label: "Impact numbers"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label above the heading", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - name: items
                label: Numbers
                label_singular: number
                widget: list
                required: false
                summary: "{{fields.value}} — {{fields.label}}"
                fields:
                  - { name: value, label: "Value (e.g. 5,000+)", widget: string, required: false }
                  - { name: label, label: Label, widget: string, required: false }
          - name: mission
            label: "Mission — three pillars"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label above the heading", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - { name: intro, label: "Intro paragraph", widget: text, required: false }
              - name: pillars
                label: "Pillars (keep exactly 3 — shown left, right, bottom around the mandala)"
                label_singular: pillar
                widget: list
                required: false
                summary: "{{fields.title}}"
                fields:
                  - { name: title, label: Title, widget: string, required: false }
                  - { name: text, label: Text, widget: text, required: false }
          - name: featuredConference
            label: "Upcoming conference"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label above the heading", widget: string, required: false }
              - { name: heading, label: "Section heading", widget: string, required: false }
              - { name: sub, label: "Line under the heading", widget: string, required: false }
              - name: card
                label: "Conference card"
                widget: object
                required: false
                fields:
                  - { name: img, label: Photo, widget: image, required: false }
                  - { name: eyebrow, label: "Small label on the card", widget: string, required: false }
                  - { name: title, label: Title, widget: string, required: false }
                  - { name: meta, label: "Date line (e.g. June 19–26, 2027)", widget: string, required: false }
                  - { name: location, label: "Location (City, Country)", widget: string, required: false }
                  - { name: text, label: Text, widget: text, required: false }
                  - { name: cfpNote, label: "Call-for-papers note (under the text — leave empty to hide)", widget: text, required: false }
                  - name: cfpLink
                    label: "Call-for-papers link"
                    widget: object
                    required: false
                    fields:
                      - { name: label, label: "Link text", widget: string, required: false }
                      - { name: href, label: "Link target", widget: string, required: false }
                  - name: cta
                    label: Button
                    widget: object
                    required: false
                    fields:
                      - { name: label, label: Label, widget: string, required: false }
                      - { name: href, label: Link, widget: string, required: false }
          - name: highlights
            label: "Conference highlights video"
            widget: object
            required: false
            fields:
              - name: cta2
                label: "Secondary button (leave label empty to hide)"
                widget: object
                required: false
                fields:
                  - { name: label, label: "Button label", widget: string, required: false }
                  - { name: href, label: "Button link", widget: string, required: false }
              - { name: eyebrow, label: "Small label above the heading", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - { name: youtubeId, label: "YouTube video ID", widget: string, hint: "The part after watch?v= — e.g. IRr-CQYdQ8o", required: false }
              - { name: img, label: "Preview image (shown before play)", widget: image, required: false }
              - { name: caption, label: "Caption on the video (e.g. SARAWAK · JUNE 2025)", widget: string, required: false }
              - name: cta
                label: "Button under the video"
                widget: object
                required: false
                fields:
                  - { name: label, label: Label, widget: string, required: false }
                  - { name: href, label: Link, widget: string, required: false }
          - name: pastConferences
            label: "Past conferences strip"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label above the heading", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - name: seeAll
                label: "See-all button"
                widget: object
                required: false
                fields:
                  - { name: label, label: Label, widget: string, required: false }
                  - { name: href, label: Link, widget: string, required: false }
              - name: cards
                label: "Conference cards"
                label_singular: card
                widget: list
                required: false
                summary: "{{fields.num}} · {{fields.title}}"
                fields:
                  - { name: num, label: "Badge (e.g. #19)", widget: string, required: false }
                  - { name: img, label: Photo, widget: image, required: false }
                  - { name: meta, label: "Meta line (e.g. 2025 · SARAWAK, MALAYSIA)", widget: string, required: false }
                  - { name: title, label: Title, widget: string, required: false }
                  - { name: linkLabel, label: "Link text (e.g. View conference →)", widget: string, required: false }
                  - { name: href, label: Link, widget: string, required: false }
          - name: latest
            label: "Latest from Sakyadhita"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label above the heading", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - name: seeAll
                label: "See-all button"
                widget: object
                required: false
                fields:
                  - { name: label, label: Label, widget: string, required: false }
                  - { name: href, label: Link, widget: string, required: false }
              - name: feature
                label: "Big featured card"
                widget: object
                required: false
                fields:
                  - { name: img, label: Image, widget: image, required: false }
                  - name: focus
                    label: "Image focal point"
                    widget: focal
                    required: false
                  - { name: eyebrow, label: "Small label on the card", widget: string, required: false }
                  - { name: title, label: Title, widget: string, required: false }
                  - { name: text, label: Text, widget: text, required: false }
                  - { name: linkLabel, label: "Link text (e.g. Read latest issue →)", widget: string, required: false }
                  - { name: href, label: Link, widget: string, required: false }
              - name: items
                label: "Small cards"
                label_singular: card
                widget: list
                required: false
                summary: "{{fields.title}}"
                fields:
                  - { name: img, label: Image, widget: image, required: false }
                  - { name: eyebrow, label: "Small label on the card", widget: string, required: false }
                  - { name: title, label: Title, widget: string, required: false }
                  - { name: linkLabel, label: "Link text (e.g. Read story →)", widget: string, required: false }
                  - { name: href, label: Link, widget: string, required: false }
          - name: press
            label: "Press logos (As covered by)"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label above the heading", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - name: logos
                label: Logos
                label_singular: logo
                widget: list
                required: false
                summary: "{{fields.alt}}"
                fields:
                  - { name: img, label: "Logo image", widget: image, required: false }
                  - { name: alt, label: "Publication name (alt text)", widget: string, required: false }
                  - { name: href, label: "Link to the article", widget: string, required: false }
                  - { name: width, label: "Logo width (e.g. 132px)", widget: string, hint: "CSS size — keep the px", required: false }
                  - { name: height, label: "Logo height (e.g. 132px or auto)", widget: string, required: false }
          - name: branches
            label: "Branches map section"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label above the heading", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - { name: text, label: "Intro paragraph", widget: text, required: false }
              - name: cta
                label: "Button under the map"
                widget: object
                required: false
                fields:
                  - { name: label, label: Label, widget: string, required: false }
                  - { name: href, label: Link, widget: string, required: false }
          - name: ways
            label: "Ways to support"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label above the heading", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - name: cards
                label: "Support cards (keep exactly 3 — the first card's button is highlighted)"
                label_singular: card
                widget: list
                required: false
                summary: "{{fields.title}}"
                fields:
                  - { name: img, label: "Illustration", widget: image, required: false }
                  - { name: title, label: Title, widget: string, required: false }
                  - { name: text, label: Text, widget: text, required: false }
                  - { name: ctaLabel, label: "Button label", widget: string, required: false }
                  - { name: href, label: Link, widget: string, required: false }
      - name: resources
        label: "📖 Resources page"
        file: src/data/pages/resources.json
        description: >
          All text, images, and cards on the Resources landing page. The
          newsletter and publications libraries themselves are edited in
          their own collections.
        fields:
          - { name: _comment, label: "(internal note)", widget: string, required: false }
          - name: seo
            label: "Browser tab & link previews (SEO)"
            widget: object
            required: false
            collapsed: true
            fields:
              - { name: title, label: "Page title (browser tab)", widget: string, required: false }
              - { name: description, label: "Description (search engines & link previews)", widget: text, required: false }
              - { name: ogImage, label: "Link-preview image", widget: image, required: false }
          - name: hero
            label: "Hero (top of page)"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label above the heading", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - { name: lede, label: "Intro paragraph", widget: text, required: false }
          - name: libraryCards
            label: "Library cards (the 4 big cards)"
            label_singular: card
            widget: list
            required: false
            summary: "{{fields.title}}"
            fields:
              - { name: img, label: Image, widget: image, required: false }
              - { name: count, label: "Badge on the image (e.g. LIBRARY · 42 ISSUES)", widget: string, required: false }
              - { name: title, label: Title, widget: string, required: false }
              - { name: text, label: Text, widget: text, required: false }
              - { name: ctaLabel, label: "Link text (e.g. Browse newsletters →)", widget: string, required: false }
              - { name: href, label: Link, widget: string, required: false }
          - name: featured
            label: "Featured this month"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label above the heading", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - name: cards
                label: "Featured cards"
                label_singular: card
                widget: list
                required: false
                summary: "{{fields.title}}"
                fields:
                  - { name: img, label: Image, widget: image, required: false }
                  - { name: eyebrow, label: "Small label on the card (e.g. NEWSLETTER · 2025)", widget: string, required: false }
                  - { name: title, label: Title, widget: string, required: false }
                  - { name: text, label: Text, widget: text, required: false }
                  - { name: ctaLabel, label: "Link text (e.g. Read latest →)", widget: string, required: false }
                  - { name: href, label: Link, widget: string, required: false }
      # ── ABOUT PAGE — all editable text ──────────────────────────
      - name: about
        label: "ℹ️ About page"
        file: src/data/pages/about.json
        description: >
          All the text on the About page. The History timeline entries are
          edited under "Timelines (About + Ordination)", and the Executive
          Committee under "Leadership".
        fields:
          - name: seo
            label: "Browser tab & link previews"
            widget: object
            required: false
            collapsed: true
            fields:
              - { name: title, label: "Browser tab title", widget: string, required: false }
              - { name: description, label: "Description (for search engines & shared links)", widget: text, required: false }
              - { name: ogImage, label: "Link-preview image", widget: image, required: false }
          - name: hero
            label: "Top of the page"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label above the title (e.g. ABOUT SAKYADHITA)", widget: string, required: false }
              - { name: title, label: "Big title", widget: string, required: false }
              - { name: lede, label: "Intro paragraph", widget: text, required: false }
          - name: story
            label: "Our Story"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label (e.g. OUR STORY)", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - name: paragraphs
                label: Paragraphs
                label_singular: paragraph
                widget: list
                required: false
                field: { name: text, label: Paragraph, widget: text, hint: "Wrap a word in <em>…</em> for italics", required: false }
              - name: photos
                label: Photos
                label_singular: photo
                widget: list
                required: false
                summary: "{{fields.alt}}"
                fields:
                  - { name: src, label: Photo, widget: image, required: false }
                  - { name: alt, label: "Photo description (for screen readers)", widget: string, required: false }
          - name: history
            label: "History & Milestones"
            widget: object
            required: false
            fields:
              - { name: heading, label: Heading, widget: string, hint: "The timeline entries themselves live under ⚙️ Site settings → Timelines", required: false }
          - name: mission
            label: "Mission — the seven objectives"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label (e.g. MISSION)", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - { name: sub, label: "Text under the heading", widget: text, required: false }
              - name: objectives
                label: "Objective cards"
                label_singular: objective
                widget: list
                required: false
                summary: "{{fields.title}}"
                fields:
                  - { name: icon, label: Icon, widget: image, required: false }
                  - { name: title, label: Title, widget: string, required: false }
                  - { name: text, label: Text, widget: text, required: false }
          - name: leadership
            label: Leadership
            widget: object
            required: false
            fields:
              - { name: heading, label: Heading, widget: string, hint: "Committee members & terms are edited under 👥 Leadership", required: false }
          - name: projects
            label: "International Projects"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label (e.g. INTERNATIONAL PROJECTS)", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - name: cards
                label: "Project cards"
                label_singular: project
                widget: list
                required: false
                summary: "{{fields.title}}"
                fields:
                  - { name: image, label: Photo, widget: image, required: false }
                  - { name: imageAlt, label: "Photo description (for screen readers)", widget: string, required: false }
                  - { name: title, label: Title, widget: string, required: false }
                  - { name: location, label: "Location (e.g. Bodhgaya, India)", widget: string, required: false }
                  - { name: text, label: Text, widget: text, required: false }
                  - { name: href, label: "Website link", widget: string, required: false }
                  - { name: linkLabel, label: "Link text (e.g. Visit website →)", widget: string, required: false }
          - name: branches
            label: "Branches & Chapters teaser"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label (e.g. BRANCHES & CHAPTERS)", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - { name: text, label: Text, widget: text, required: false }
              - name: button
                label: Button
                widget: object
                required: false
                fields:
                  - { name: label, label: "Button text (the → arrow is added automatically)", widget: string, required: false }
                  - { name: href, label: Link, widget: string, required: false }
      # ── ORDINATION ISSUE PAGE — all editable text ───────────────
      - name: ordination
        label: "🪷 Ordination Issue page"
        file: src/data/pages/ordination.json
        description: >
          All the text on the Ordination Issue page. The Movement timeline
          entries are edited under "Timelines (About + Ordination)".
        fields:
          - name: seo
            label: "Browser tab & link previews"
            widget: object
            required: false
            collapsed: true
            fields:
              - { name: title, label: "Browser tab title", widget: string, required: false }
              - { name: description, label: "Description (for search engines & shared links)", widget: text, required: false }
              - { name: ogImage, label: "Link-preview image", widget: image, required: false }
          - name: hero
            label: "Top of the page"
            widget: object
            required: false
            fields:
              - { name: title, label: "Big title", widget: string, required: false }
              - { name: text, label: "Intro paragraph", widget: text, required: false }
              - name: images
                label: "Hero photos (4 across)"
                label_singular: photo
                widget: list
                required: false
                summary: "{{fields.alt}}"
                fields:
                  - { name: src, label: Photo, widget: image, required: false }
                  - { name: alt, label: "Photo description (for screen readers)", widget: string, required: false }
                  - name: objectPosition
                    label: "Focal point"
                    widget: focal
                    required: false
              - name: credit
                label: "Photo credit line"
                widget: object
                required: false
                fields:
                  - { name: text, label: "Text before the link", widget: string, required: false }
                  - { name: linkLabel, label: "Photographer name (the link)", widget: string, required: false }
                  - { name: linkHref, label: "Photographer website", widget: string, required: false }
          - name: overview
            label: Overview
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label (e.g. OVERVIEW)", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - name: paragraphs
                label: Paragraphs
                label_singular: paragraph
                widget: list
                required: false
                field: { name: text, label: Paragraph, widget: text, hint: "Wrap a word in <em>…</em> for italics", required: false }
              - name: stats
                label: "The 3 numbers"
                label_singular: number
                widget: list
                required: false
                summary: "{{fields.num}} — {{fields.label}}"
                fields:
                  - { name: num, label: "Number (e.g. 2,000+)", widget: string, required: false }
                  - { name: label, label: "Label under the number", widget: string, required: false }
          - name: origins
            label: Origins
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label (e.g. ORIGINS)", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - name: paragraphs
                label: Paragraphs
                label_singular: paragraph
                widget: list
                required: false
                field: { name: text, label: Paragraph, widget: text, required: false }
              - { name: image, label: "Image (upload or paste a link)", widget: string, hint: "Currently a Wikimedia Commons link", required: false }
              - { name: imageAlt, label: "Image description (for screen readers)", widget: string, required: false }
              - { name: caption, label: "Caption under the image", widget: string, required: false }
          - name: movement
            label: "The Movement"
            widget: object
            required: false
            fields:
              - { name: heading, label: Heading, widget: string, hint: "The milestones themselves live under ⚙️ Site settings → Timelines", required: false }
          - name: watch
            label: "Watch & Learn (videos)"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label (e.g. WATCH & LEARN)", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - name: videos
                label: "Videos (the first one plays in the big player)"
                label_singular: video
                widget: list
                required: false
                summary: "{{fields.title}}"
                fields:
                  - { name: id, label: "YouTube video ID", widget: string, hint: "The part after watch?v= — e.g. _j90nTgMs_Q", required: false }
                  - { name: title, label: Title, widget: string, required: false }
                  - { name: shortDesc, label: "Short description (on the small card)", widget: string, required: false }
                  - { name: longDesc, label: "Long description (under the player)", widget: text, required: false }
          - name: seeAlso
            label: "See Also / Further reading"
            widget: object
            required: false
            fields:
              - { name: eyebrow, label: "Small label (e.g. SEE ALSO)", widget: string, required: false }
              - { name: heading, label: Heading, widget: string, required: false }
              - { name: intro, label: "Intro text", widget: text, required: false }
              - name: cards
                label: "Reading cards"
                label_singular: card
                widget: list
                required: false
                summary: "{{fields.title}}"
                fields:
                  - { name: title, label: Title, widget: string, required: false }
                  - { name: text, label: Text, widget: text, required: false }
                  - { name: href, label: Link, widget: string, required: false }
      - name: contact
