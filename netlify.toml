# Netlify build configuration — lives in the repo so the settings
# can never drift from what the code needs.
[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Security headers (matching the old site) + long-cache for build assets
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Media caching: browsers and crawlers keep files instead of re-downloading
# on every visit. 1 day for CMS uploads (safe if an editor replaces a file
# under the same name), 1 week for built-in assets.
[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
