# Netlify build configuration — lives in the repo so the settings
# can never drift from what the code needs.
[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Security headers (matching the old site) + long-cache for build assets
[[headers]]
  for = "/*"
  [headers.values]
    # PREVIEW MODE: tell all bots not to index. Remove at launch.
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
