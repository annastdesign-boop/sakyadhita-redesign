# ────────────────────────────────────────────────────────────────
# Sakyadhita Content Editor (Decap CMS)
#
# HOW PUBLISHING WORKS (draft workflow):
#   Save = Draft → move to "In review" → "Ready" → Publish.
#   Nothing appears on the website until someone clicks Publish.
#   The Workflow tab (top bar) shows everything awaiting review.
#
# Every Publish becomes a commit and the site redeploys (~2 min).
# ────────────────────────────────────────────────────────────────

backend:
  name: github
  repo: annastdesign-boop/sakyadhita-redesign
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

publish_mode: editorial_workflow

site_url: https://sakyadhita-redesign.netlify.app
logo_url: https://sakyadhita-redesign.netlify.app/assets/logo-flower.png

media_folder: public/uploads
public_folder: /uploads

# Focal point choices reused by every image that supports one
_focus_options: &focus_options
  - { label: "Center (default)", value: "" }
  - { label: "Top (faces near the top)", value: "center top" }
  - { label: "Upper third", value: "50% 30%" }
  - { label: "Bottom", value: "center bottom" }
  - { label: "Left", value: "left center" }
  - { label: "Right", value: "right center" }

collections:
  # ── CONFERENCES — one entry per conference ────────────────────
  - name: conferences
    label: "🪷 Conferences"
    label_singular: "conference"
    folder: src/content/conferences
    format: json
    extension: json
    create: true
    identifier_field: title
    slug: "{{fields.n}}"
    summary: "#{{fields.n}} · {{fields.year}} · {{fields.title}}"
    sortable_fields: ["n", "year", "title"]
    editor: { preview: false }
    description: >
      One entry per conference — each is its own page on the site. Click
      "New conference" to create the next one. When a conference has
      happened, turn OFF "Upcoming" and it becomes a past-conference page
      where you add photos, video, press coverage, and materials.
    fields:
      - { name: n, label: "Number (e.g. 21)", widget: number, value_type: int }
      - { name: year, label: Year, widget: string }
      - { name: flag, label: "Flag emoji", widget: string, hint: "e.g. 🇮🇩" }
      - { name: loc, label: Location, widget: string, hint: "e.g. Kuching · Sarawak, East Malaysia" }
      - { name: title, label: Title, widget: string }
      - { name: subtitle, label: Subtitle, widget: string, required: false }
      - { name: dates, label: "Dates (as text)", widget: string }
      - { name: host, label: "Hosted by", widget: string }
      - { name: upcoming, label: "Upcoming? (turn OFF once the conference has happened)", widget: boolean, required: false }
      - { name: about, label: "About the conference", widget: text }
      - { name: heroImg, label: "Hero image", widget: image, required: false }
      - name: heroFocus
        label: "Hero image focal point"
        widget: select
        options: *focus_options
        required: false
      - { name: thumb, label: "Thumbnail (for lists)", widget: image, required: false }
      - { name: noPhotoCredit, label: "Hide the Olivier Adam photo credit", widget: boolean, required: false }
      - name: video
        label: "Highlight video"
        widget: object
        required: false
        collapsed: true
        fields:
          - { name: yt, label: "YouTube video ID", widget: string, required: false, hint: "The part after watch?v= — e.g. IRr-CQYdQ8o" }
          - { name: file, label: "…or upload a video file (mp4)", widget: file, required: false, hint: "If both are set, the uploaded file wins" }
          - { name: title, label: Title, widget: string, required: false }
          - { name: caption, label: "Caption (e.g. SARAWAK · JUNE 2025)", widget: string, required: false }
          - { name: thumb, label: "Preview image", widget: image, required: false }
      - name: photos
        label: "Photos & videos gallery"
        label_singular: item
        widget: list
        required: false
        summary: "{{fields.caption}}"
        fields:
          - { name: f, label: "Photo", widget: image, required: false }
          - { name: yt, label: "…or YouTube video ID", widget: string, required: false }
          - { name: caption, label: Caption, widget: string }
          - name: focus
            label: "Focal point"
            widget: select
            options: *focus_options
            required: false
      - name: coverage
        label: "Media coverage"
        label_singular: article
        widget: list
        required: false
        summary: "{{fields.outlet}} — {{fields.headline}}"
        fields:
          - { name: outlet, label: "Outlet (e.g. TRICYCLE)", widget: string }
          - { name: date, label: Date, widget: string }
          - { name: headline, label: Headline, widget: string }
          - { name: excerpt, label: Excerpt, widget: text }
          - { name: href, label: "Link to the article", widget: string }
          - { name: img, label: "Thumbnail image", widget: image, required: false }
      - name: materialsVisible
        label: "Show conference materials? (unhide when files are ready)"
        widget: boolean
        required: false
      - name: materials
        label: "Conference materials (downloads)"
        label_singular: material
        widget: list
        required: false
        summary: "{{fields.title}}"
        fields:
          - { name: chip, label: "Tag (e.g. PROGRAM / SCHEDULE / PAPERS)", widget: string }
          - { name: title, label: Title, widget: string }
          - { name: file, label: "File (PDF)", widget: file }
          - { name: note, label: "Note (e.g. PDF · 4 MB)", widget: string, required: false }

  # ── NEWSLETTERS — one entry per issue ─────────────────────────
  - name: newsletters
    label: "📰 Newsletters"
    label_singular: "issue"
    folder: src/content/newsletters
    format: json
    extension: json
    create: true
    identifier_field: title
    slug: "{{fields.year}}-{{slug}}"
    summary: "{{fields.year}} · {{fields.title}}"
    sortable_fields: ["sort", "year", "title"]
    editor: { preview: false }
    description: >
      One entry per newsletter issue. Click "New issue" for a new one —
      it appears in the right decade automatically. Turn on "Featured"
      to also show it in the big carousel at the top of the page.
    fields:
      - { name: year, label: Year, widget: string }
      - { name: title, label: "Title (e.g. Volume 34)", widget: string }
      - { name: vol, label: "Volume label (e.g. VOL 34 · NO 1)", widget: string, required: false }
      - { name: sort, label: "Sort weight (higher = shown first — e.g. newest issue 440, next 430…)", widget: number, value_type: int }
      - { name: img, label: "Cover image (leave empty for a coloured cover)", widget: image, required: false }
      - { name: c1, label: "Cover colour 1 (e.g. #4F3E81)", widget: string, required: false }
      - { name: c2, label: "Cover colour 2", widget: string, required: false }
      - { name: pdf, label: "PDF (upload or link)", widget: file }
      - { name: featured, label: "Featured in the top carousel?", widget: boolean, required: false }
      - { name: eyebrow, label: "Carousel small label (e.g. LATEST ISSUE · 2026)", widget: string, required: false }
      - { name: desc, label: "Carousel description", widget: text, required: false }
      - { name: cta, label: "Carousel button text (e.g. Read latest issue (PDF))", widget: string, required: false }

  # ── PUBLICATIONS — one entry per card ─────────────────────────
  - name: publications
    label: "📚 Publications"
    label_singular: "card"
    folder: src/content/publications
    format: json
    extension: json
    create: true
    identifier_field: title
    slug: "{{fields.section}}-{{slug}}"
    summary: "{{fields.title}} ({{fields.section}})"
    sortable_fields: ["section", "sort", "title"]
    editor: { preview: false }
    description: >
      Every card in the Publications library. "Section" decides where the
      card appears on the page; "Sort weight" orders cards inside a section
      (lower = earlier).
    fields:
      - name: section
        label: "Which section of the page?"
        widget: select
        options:
          - { label: "Bibliographies", value: bibliographies }
          - { label: "Books", value: books }
          - { label: "Conference brochures", value: conference-brochures }
          - { label: "Translations & articles", value: translations }
      - { name: group, label: "Language group (Translations only — e.g. English, German)", widget: string, required: false }
      - { name: sort, label: "Sort weight (lower = earlier in its section)", widget: number, value_type: int }
      - { name: kind, label: "Small label above title (optional)", widget: string, required: false }
      - { name: title, label: Title, widget: string }
      - { name: author, label: Author, widget: string, required: false }
      - { name: href, label: "Link or PDF upload", widget: file }
      - { name: source, label: "Source (e.g. SUNY Press)", widget: string }
      - name: linkLabel
        label: "Link text"
        widget: select
        options: ["PDF →", "View →"]
      - name: cover
        label: Cover
        widget: object
        fields:
          - name: style
            label: "Cover style"
            widget: select
            options:
              - { label: "Photo (pick an image below)", value: photo }
              - { label: "Gradient · purple/indigo", value: g1 }
              - { label: "Gradient · rose/indigo", value: g2 }
              - { label: "Gradient · orange/berry", value: g3 }
              - { label: "Gradient · violet/indigo", value: g4 }
              - { label: "Gradient · lavender/purple", value: g5 }
          - { name: image, label: "Cover photo (for Photo style)", widget: image, required: false }
          - { name: coverImg, label: "Book-cover image URL (optional overlay)", widget: string, required: false }

  # ── LEADERSHIP — one entry per term ───────────────────────────
  - name: leadership
    label: "👥 Leadership"
    label_singular: "term"
    folder: src/content/leadership
    format: json
    extension: json
    create: true
    identifier_field: label
    summary: "{{fields.label}}"
    sortable_fields: ["sort", "label"]
    editor: { preview: false }
    description: >
      The Executive Committee on the About page. To start a new term,
      click "New term", give it years (e.g. 2025–2029), a higher Sort
      weight than the previous term, and add the members.
    fields:
      - { name: label, label: "Term years (e.g. 2025–2029)", widget: string }
      - { name: sort, label: "Sort weight (higher = newer, shown first)", widget: number, value_type: int }
      - name: members
        label: Members
        label_singular: member
        widget: list
        summary: "{{fields.name}} — {{fields.role}}"
        fields:
          - { name: name, label: Name, widget: string }
          - { name: role, label: "Role (e.g. President)", widget: string }
          - { name: img, label: "Portrait photo (optional — lotus shown if empty)", widget: image, required: false }
          - { name: card, label: "One-line summary (shown on the card)", widget: string }
          - { name: bio, label: "Full biography (shown in the popup)", widget: text }

  # ── BRANCHES — one entry per location ─────────────────────────
  - name: branches
    label: "🌏 Branches"
    label_singular: "location"
    folder: src/content/branches
    format: json
    extension: json
    create: true
    identifier_field: name
    slug: "{{fields.id}}"
    summary: "{{fields.name}} ({{fields.region}})"
    sortable_fields: ["region", "name"]
    editor: { preview: false }
    description: >
      Branches, chapters, and partners — shown in the Branches directory
      and (when "Show on home-page map" is on) as a pin on the home page.
    fields:
      - { name: id, label: "Short id (lowercase, no spaces — e.g. spain)", widget: string }
      - { name: name, label: Name, widget: string }
      - name: region
        label: Region
        widget: select
        options: [Asia, Americas, Europe, Africa, Oceania]
      - name: type
        label: Type
        widget: select
        options:
          - { label: "National branch", value: branch }
          - { label: "Local chapter", value: local }
          - { label: "Partner", value: partner }
      - { name: lat, label: "Latitude (map pin)", widget: number, value_type: float }
      - { name: lng, label: "Longitude (map pin)", widget: number, value_type: float }
      - { name: desc, label: Description, widget: text }
      - { name: homeMap, label: "Show on the home-page map?", widget: boolean, required: false }
      - { name: homeDesc, label: "Shorter description for the home-page map (optional)", widget: text, required: false }
      - name: contact
        label: "Contact rows"
        label_singular: row
        widget: list
        required: false
        summary: "{{fields.icon}} {{fields.text}}"
        fields:
          - { name: icon, label: "Emoji (📧 📞 🌐 📍)", widget: string }
          - { name: text, label: Text, widget: string }
          - { name: url, label: "Link (optional — use mailto: for email)", widget: string, required: false }

  # ── SITE PAGES & SETTINGS (single documents) ──────────────────
  # Note: these save straight to the site (no draft step) — that's a
  # technical limitation for single-document settings.
  - name: settings
    label: "⚙️ Site settings & timelines"
    editor: { preview: false }
    files:
      - name: navigation
        label: "🧭 Top navigation menu"
        file: src/data/navigation.json
        description: >
          The site's main menu. ⚠️ Don't change the "key" values — they
          control which menu item is highlighted on each page.
        fields:
          - { name: _comment, label: "(internal note)", widget: string, required: false }
          - name: links
            label: "Menu items"
            label_singular: item
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { name: key, label: "Key (don't change)", widget: string }
              - { name: label, label: Label, widget: string }
              - { name: href, label: Link, widget: string }
              - name: submenu
                label: "Dropdown items (optional)"
                label_singular: item
                widget: list
                required: false
                summary: "{{fields.label}}"
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: href, label: Link, widget: string }
          - name: cta
            label: "Highlighted button (right side)"
            widget: object
            fields:
              - { name: label, label: Label, widget: string }
              - { name: href, label: Link, widget: string }
      - name: footer
        label: "🦶 Footer"
        file: src/data/footer.json
        description: "Everything in the site footer."
        fields:
          - { name: _comment, label: "(internal note)", widget: string, required: false }
          - { name: blurb, label: "Short description under the logo", widget: text }
          - name: social
            label: "Social links"
            label_singular: link
            widget: list
            summary: "{{fields.label}}"
            fields:
              - name: icon
                label: "Icon (don't change — picks the logo)"
                widget: select
                options: [facebook, youtube, pinterest, blog, goodreads]
              - { name: label, label: Name, widget: string }
              - { name: url, label: Link, widget: string }
          - name: columns
            label: "Link columns"
            label_singular: column
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: "Column title", widget: string }
              - name: links
                label: Links
                label_singular: link
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: href, label: Link, widget: string }
          - { name: address, label: "Postal address (use <br/> for a line break)", widget: string }
          - name: newsletter
            label: "Newsletter box"
            widget: object
            fields:
              - { name: title, label: Title, widget: string }
              - { name: text, label: Text, widget: string }
          - { name: bottomText, label: "Bottom line (after the © year)", widget: text }
      - name: timelines
        label: "🗓 Timelines (About + Ordination)"
        file: src/data/timelines.json
        fields:
          - { name: _comment, label: "(internal note)", widget: string, required: false }
          - name: aboutHistory
            label: "About page · History & Milestones"
            label_singular: milestone
            widget: list
            summary: "{{fields.year}} — {{fields.title}}"
            fields:
              - { name: year, label: Year, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: text, label: Text, widget: text }
              - { name: image, label: Image, widget: image, required: false }
              - name: imagePosition
                label: "Image focal point"
                widget: select
                options: *focus_options
                required: false
          - name: ordinationMovement
            label: "Ordination page · Movement milestones"
            label_singular: milestone
            widget: list
            summary: "{{fields.year}} — {{fields.title}}"
            fields:
              - { name: year, label: Year, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: text, label: Text, widget: text }
              - { name: image, label: Image, widget: image, required: false }
              - name: imagePosition
                label: "Image focal point"
                widget: select
                options: *focus_options
                required: false
              - { name: link, label: "Learn-more link (optional)", widget: string, required: false }
      - name: membership-brochures
        label: "📄 Membership brochures panel"
        file: src/data/membership-brochures.json
        fields:
          - { name: _comment, label: "(internal note)", widget: string, required: false }
          - { name: image, label: "Panel image", widget: image }
          - name: languages
            label: Languages
            label_singular: language
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: flag, label: "Flag emoji", widget: string }
              - { name: name, label: Language, widget: string }
              - { name: pdf, label: "PDF link or upload", widget: file }
      - name: publication-groups
        label: "📚 Translation group order"
        file: src/data/publication-groups.json
        fields:
          - { name: _comment, label: "(internal note)", widget: string, required: false }
          - name: order
            label: "Group headings, in display order"
            widget: list
            field: { name: heading, label: Heading, widget: string }
